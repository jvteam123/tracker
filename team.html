<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB SQUAD RANDOMIZER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        h1, h2, .gaming-font {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .ml-card {
            background: rgba(30, 30, 50, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .btn-primary {
            background: linear-gradient(135deg, #c3a462 0%, #8a6d3b 100%);
            color: #000;
            transition: all 0.3s ease;
            text-shadow: 0 1px 2px rgba(255,255,255,0.3);
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(195, 164, 98, 0.5);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6b21a8 0%, #4c1d95 100%);
            color: #fff;
        }
        .input-dark {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid #444 !important;
            color: #fff !important;
        }
        .input-dark:focus {
            border-color: #c3a462 !important;
            ring: 1px solid #c3a462;
        }
        .team-blaze { border-top: 4px solid #c3a462; }
        .team-venom { border-top: 4px solid #a855f7; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #c3a462; }

        .pinning-item-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: center;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-b from-yellow-200 to-yellow-600 mb-2">
                Squad Randomizer
            </h1>
            <p class="text-gray-400 italic text-sm">Draft your legendary team for the Land of Dawn</p>
        </header>
        
        <div class="ml-card p-6 rounded-2xl mb-8 border-b-2 border-yellow-900/30">
            <label for="nameInput" class="block text-sm font-bold text-yellow-500 mb-3 gaming-font">
                [1] Register Players (Names/Commas)
            </label>
            <textarea id="nameInput" rows="5" class="w-full p-4 input-dark rounded-xl focus:outline-none text-lg" placeholder="Enter IGNs..."></textarea>
            
            <button id="loadNamesBtn" onclick="loadNamesAndRenderPins()" class="mt-4 w-full btn-primary font-bold py-4 px-4 rounded-xl shadow-lg gaming-font">
                Initialize Draft
            </button>
            
            <div id="pinningOptions" class="mt-8 pt-6 border-t border-gray-700 hidden">
                <h2 class="text-lg font-bold text-purple-400 mb-4 gaming-font">
                    [2] Assign Lane/Squad Preference
                </h2>
                <div id="nameEntryContainer" class="space-y-2 max-h-80 overflow-y-auto pr-2">
                    </div>
                
                <button id="randomizeBtn" onclick="generateTeams()" class="mt-6 w-full btn-secondary font-bold py-4 px-4 rounded-xl shadow-lg gaming-font hover:brightness-125 transition-all">
                    Launch Matchmaking
                </button>
            </div>
            
            <div id="messageBox" class="mt-4 p-4 hidden rounded-lg text-center text-sm font-bold" role="alert"></div>
        </div>

        <div id="teamOutput" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div id="team1Card" class="ml-card rounded-2xl overflow-hidden team-blaze transition-transform duration-300">
                <div class="bg-gradient-to-r from-yellow-700 to-yellow-900 p-4 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-white gaming-font">Squad Blaze</h2>
                    <span id="team1Count" class="bg-black/40 text-yellow-400 border border-yellow-500 font-bold px-3 py-1 rounded text-xs">0 / 5</span>
                </div>
                <ul id="team1List" class="p-6 space-y-3 text-lg">
                    <li class="text-gray-500 italic text-sm">Waiting for draft...</li>
                </ul>
            </div>

            <div id="team2Card" class="ml-card rounded-2xl overflow-hidden team-venom transition-transform duration-300">
                <div class="bg-gradient-to-r from-purple-800 to-indigo-900 p-4 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-white gaming-font">Squad Venom</h2>
                    <span id="team2Count" class="bg-black/40 text-purple-300 border border-purple-500 font-bold px-3 py-1 rounded text-xs">0 / 5</span>
                </div>
                <ul id="team2List" class="p-6 space-y-3 text-lg">
                     <li class="text-gray-500 italic text-sm">Waiting for draft...</li>
                </ul>
            </div>
            
        </div>
    </div>

    <script>
        const nameInput = document.getElementById('nameInput');
        const loadNamesBtn = document.getElementById('loadNamesBtn');
        const randomizeBtn = document.getElementById('randomizeBtn');
        const pinningOptions = document.getElementById('pinningOptions');
        const nameEntryContainer = document.getElementById('nameEntryContainer');
        const team1List = document.getElementById('team1List');
        const team2List = document.getElementById('team2List');
        const team1Count = document.getElementById('team1Count');
        const team2Count = document.getElementById('team2Count');
        const messageBox = document.getElementById('messageBox');
        const team1Card = document.getElementById('team1Card');
        const team2Card = document.getElementById('team2Card');
        
        let currentNames = [];

        function saveNames() {
            localStorage.setItem('mlbbRandomizerNames', nameInput.value);
        }

        function loadSavedNames() {
            const savedNames = localStorage.getItem('mlbbRandomizerNames');
            nameInput.value = savedNames || "Skywee\nDogie\nOhMyV33nus\nWise\nEdward\nHadjji\nOheb\nCh4knu\nZ4pnu\nKelra";
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function showMessage(message, type) {
            messageBox.textContent = `SYSTEM: ${message}`;
            messageBox.classList.remove('hidden', 'bg-red-900/50', 'text-red-200', 'bg-green-900/50', 'text-green-200');
            if (type === 'error') {
                messageBox.classList.add('bg-red-900/50', 'text-red-200', 'border', 'border-red-500');
            } else {
                messageBox.classList.add('bg-green-900/50', 'text-green-200', 'border', 'border-green-500');
            }
        }

        function clearTeams() {
            team1List.innerHTML = `<li class="text-gray-500 italic text-sm">Waiting for draft...</li>`;
            team2List.innerHTML = `<li class="text-gray-500 italic text-sm">Waiting for draft...</li>`;
            team1Count.textContent = "0 / 5";
            team2Count.textContent = "0 / 5";
            messageBox.classList.add('hidden');
        }
        
        function loadNamesAndRenderPins() {
            saveNames();
            messageBox.classList.add('hidden');
            
            const names = nameInput.value
                .split(/[\n,]+/)
                .map(name => name.trim())
                .filter(name => name.length > 0)
                .filter((name, index, self) => self.indexOf(name) === index);

            if (names.length < 2) {
                pinningOptions.classList.add('hidden');
                clearTeams();
                showMessage("NOT ENOUGH HEROES. ENTER AT LEAST 2 PLAYERS.", 'error');
                return;
            }

            currentNames = names;
            renderPinningOptions(currentNames);
            pinningOptions.classList.remove('hidden');
            showMessage(`${currentNames.length} PLAYERS READY FOR DRAFT.`, 'success');
        }

        function renderPinningOptions(names) {
            nameEntryContainer.innerHTML = '';
            names.forEach((name, index) => {
                const item = document.createElement('div');
                item.className = 'pinning-item-grid p-3 bg-black/20 border border-white/5 rounded-lg';
                
                const nameSpan = document.createElement('span');
                nameSpan.textContent = name;
                nameSpan.className = 'text-gray-200 font-semibold';

                const select = document.createElement('select');
                select.id = `pin-${index}`;
                select.className = 'p-1 bg-gray-800 border border-gray-600 rounded text-xs text-yellow-500 outline-none'; 
                select.innerHTML = `
                    <option value="Random">AUTO-FILL</option>
                    <option value="Team1">SQUAD BLAZE</option>
                    <option value="Team2">SQUAD VENOM</option>
                `;
                
                item.appendChild(nameSpan);
                item.appendChild(select);
                nameEntryContainer.appendChild(item);
            });
        }
        
        function generateTeams() {
            if (currentNames.length < 2) return;

            let team1Pinned = [], team2Pinned = [], randomPool = [];

            currentNames.forEach((name, index) => {
                const selection = document.getElementById(`pin-${index}`).value;
                if (selection === 'Team1') team1Pinned.push(name);
                else if (selection === 'Team2') team2Pinned.push(name);
                else randomPool.push(name);
            });
            
            shuffleArray(randomPool);

            let finalTeam1 = [...team1Pinned], finalTeam2 = [...team2Pinned];

            for (const name of randomPool) {
                if (finalTeam1.length <= finalTeam2.length) finalTeam1.push(name);
                else finalTeam2.push(name);
            }

            renderTeams(finalTeam1, finalTeam2, team1Pinned, team2Pinned);
            showMessage("MATCHMAKING COMPLETE. TO THE LAND OF DAWN!", 'success');
        }

        function renderTeams(t1, t2, p1, p2) {
            const render = (list, el, countEl, pinned) => {
                el.innerHTML = ''; 
                countEl.textContent = `${list.length} / 5`;
                
                list.forEach(name => {
                    const li = document.createElement('li');
                    li.className = 'flex items-center justify-between p-2 border-b border-white/5';
                    const isPinned = pinned.includes(name);
                    
                    li.innerHTML = `
                        <span class="${isPinned ? 'text-white font-bold' : 'text-gray-300'}">${name}</span>
                        ${isPinned ? '<span class="text-[10px] bg-yellow-600/20 text-yellow-500 px-2 py-0.5 border border-yellow-600 rounded">CORE</span>' : ''}
                    `;
                    el.appendChild(li);
                });
            };

            render(t1, team1List, team1Count, p1);
            render(t2, team2List, team2Count, p2);

            [team1Card, team2Card].forEach(c => {
                c.style.transform = 'scale(1.05)';
                setTimeout(() => c.style.transform = 'scale(1)', 200);
            });
        }

        loadSavedNames();
    </script>
</body>
</html>
