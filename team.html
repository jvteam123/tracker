<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB PRO DRAFT | Tournament Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c3a462;
            --gold-dark: #8a6d3b;
            --bg-dark: #0a0a0f;
            --panel-bg: rgba(20, 20, 30, 0.95);
        }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #050508 0%, #10101a 100%);
            color: #f0f0f0;
            min-height: 100vh;
        }
        .gaming-font { font-family: 'Orbitron', sans-serif; }
        
        /* Professional Glassmorphism */
        .pro-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .pro-panel::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(195, 164, 98, 0.2) !important;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            border-color: var(--gold) !important;
            box-shadow: 0 0 10px rgba(195, 164, 98, 0.1);
            outline: none;
        }

        .btn-gold {
            background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #000;
            font-weight: 700;
            letter-spacing: 1px;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }
        .btn-gold:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .squad-card {
            border-left: 4px solid var(--gold);
            background: linear-gradient(90deg, rgba(195,164,98,0.05) 0%, transparent 100%);
        }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-end mb-12 border-b border-white/10 pb-6">
            <div>
                <h1 class="gaming-font text-3xl md:text-4xl text-white tracking-widest font-bold">
                    <span class="text-yellow-500">PRO</span> DRAFT
                </h1>
                <p class="text-gray-500 uppercase tracking-tighter text-xs mt-1">Tournament Management System // v3.0</p>
            </div>
            <div class="text-right hidden md:block">
                <p class="text-xs text-gray-500 font-mono">STATUS: SYSTEMS OPERATIONAL</p>
                <p id="liveClock" class="text-sm font-bold text-yellow-600 font-mono"></p>
            </div>
        </header>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <section class="pro-panel p-6 rounded-sm">
                    <h3 class="gaming-font text-xs text-yellow-500 mb-4 flex items-center">
                        <span class="w-2 h-2 bg-yellow-500 mr-2 animate-pulse"></span>
                        ENTRY_PROTOCOLS
                    </h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] uppercase text-gray-500 font-bold mb-1 block">Roster Input</label>
                            <textarea id="nameInput" rows="8" class="w-full p-3 input-field rounded-sm text-sm font-mono" placeholder="LIST PLAYER IGNs..."></textarea>
                        </div>
                        
                        <button onclick="loadNamesAndRenderPins()" class="w-full btn-gold py-3 text-sm uppercase">
                            Load Team
                        </button>
                    </div>
                </section>

                <div id="messageBox" class="hidden p-4 text-xs font-bold uppercase tracking-widest text-center border border-white/10"></div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                
                <div id="pinningOptions" class="pro-panel p-6 rounded-sm hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="gaming-font text-xs text-yellow-500 italic">DRAFT_CONFIGURATION</h3>
                        <span class="text-[10px] text-gray-500" id="playerCountBadge">0 PLAYERS DETECTED</span>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="text-[10px] uppercase text-gray-400 font-bold mb-1 block">Squad 1 Name</label>
                            <input type="text" id="team1NameInput" value="SQUAD ALPHA" class="w-full p-2 input-field rounded-sm text-sm font-bold text-yellow-500">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase text-gray-400 font-bold mb-1 block">Squad 2 Name</label>
                            <input type="text" id="team2NameInput" value="SQUAD OMEGA" class="w-full p-2 input-field rounded-sm text-sm font-bold text-blue-400">
                        </div>
                    </div>

                    <div id="nameEntryContainer" class="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-64 overflow-y-auto mb-6 pr-2">
                        </div>

                    <button onclick="generateTeams()" class="w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 text-white gaming-font text-sm transition-all">
                        EXECUTE FINAL RANDOMIZATION
                    </button>
                </div>

                <div id="teamOutput" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="pro-panel rounded-sm">
                        <div class="bg-white/5 p-4 border-b border-white/10 flex justify-between items-center">
                            <h2 id="team1DisplayName" class="gaming-font text-lg text-yellow-500 truncate mr-2">SQUAD 1</h2>
                            <span id="team1Count" class="text-xs font-mono text-gray-500">0</span>
                        </div>
                        <ul id="team1List" class="p-4 space-y-2 min-h-[200px]">
                            <li class="text-gray-600 text-xs italic">Awaiting deployment...</li>
                        </ul>
                    </div>

                    <div class="pro-panel rounded-sm">
                        <div class="bg-white/5 p-4 border-b border-white/10 flex justify-between items-center">
                            <h2 id="team2DisplayName" class="gaming-font text-lg text-blue-400 truncate mr-2">SQUAD 2</h2>
                            <span id="team2Count" class="text-xs font-mono text-gray-500">0</span>
                        </div>
                        <ul id="team2List" class="p-4 space-y-2 min-h-[200px]">
                            <li class="text-gray-600 text-xs italic">Awaiting deployment...</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialization & Logic
        const nameInput = document.getElementById('nameInput');
        const pinningOptions = document.getElementById('pinningOptions');
        const nameEntryContainer = document.getElementById('nameEntryContainer');
        const messageBox = document.getElementById('messageBox');
        
        let currentNames = [];

        // Clock Update
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').textContent = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function showMessage(msg, isError) {
            messageBox.textContent = msg;
            messageBox.classList.remove('hidden', 'text-red-500', 'text-green-500');
            messageBox.classList.add(isError ? 'text-red-500' : 'text-green-500');
            setTimeout(() => messageBox.classList.add('hidden'), 4000);
        }

        function loadNamesAndRenderPins() {
            const raw = nameInput.value.split(/[\n,]+/).map(n => n.trim()).filter(n => n !== "");
            const names = [...new Set(raw)];

            if (names.length < 2) {
                showMessage("INSUFFICIENT DATA: MIN 2 PLAYERS", true);
                return;
            }

            currentNames = names;
            document.getElementById('playerCountBadge').textContent = `${names.length} OPERATIVES ACTIVE`;
            
            nameEntryContainer.innerHTML = '';
            names.forEach((name, i) => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-2 bg-white/5 border border-white/5 rounded-sm";
                div.innerHTML = `
                    <span class="text-xs font-bold truncate pr-2">${name}</span>
                    <select id="pin-${i}" class="bg-black text-[10px] text-yellow-500 border-none outline-none cursor-pointer">
                        <option value="Random">AUTO</option>
                        <option value="Team1">SQ 1</option>
                        <option value="Team2">SQ 2</option>
                    </select>
                `;
                nameEntryContainer.appendChild(div);
            });

            pinningOptions.classList.remove('hidden');
            showMessage("ROSTER SYNCHRONIZED", false);
        }

        function generateTeams() {
            const t1Name = document.getElementById('team1NameInput').value || "SQUAD 1";
            const t2Name = document.getElementById('team2NameInput').value || "SQUAD 2";
            
            document.getElementById('team1DisplayName').textContent = t1Name;
            document.getElementById('team2DisplayName').textContent = t2Name;

            let t1 = [], t2 = [], pool = [];

            currentNames.forEach((name, i) => {
                const val = document.getElementById(`pin-${i}`).value;
                if (val === 'Team1') t1.push({name, pinned: true});
                else if (val === 'Team2') t2.push({name, pinned: true});
                else pool.push({name, pinned: false});
            });

            // Fisher-Yates Shuffle
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

            pool.forEach(p => {
                if (t1.length <= t2.length) t1.push(p);
                else t2.push(p);
            });

            renderSquad(t1, 'team1List', 'team1Count', 'text-yellow-500');
            renderSquad(t2, 'team2List', 'team2Count', 'text-blue-400');
            showMessage("DRAFT SEQUENCE COMPLETE", false);
        }

        function renderSquad(members, listId, countId, accentClass) {
            const listEl = document.getElementById(listId);
            document.getElementById(countId).textContent = members.length;
            listEl.innerHTML = '';

            members.forEach(m => {
                const li = document.createElement('li');
                li.className = `flex justify-between items-center p-2 squad-card text-sm mb-1 bg-white/5 border-b border-white/5`;
                li.innerHTML = `
                    <span class="${m.pinned ? 'font-bold ' + accentClass : 'text-gray-300'}">${m.name}</span>
                    ${m.pinned ? '<span class="text-[9px] opacity-50 font-mono tracking-tighter">PRE-ASSIGNED</span>' : '<span class="text-[9px] opacity-30 font-mono">DRAFTED</span>'}
                `;
                listEl.appendChild(li);
            });
        }

        // Default Load
        nameInput.value = "Skywee\nDogie\nOhMyV33nus\nWise\nEdward\nHadjji\nOheb\nCh4knu\nZ4pnu\nKelra";
    </script>
</body>
</html>
